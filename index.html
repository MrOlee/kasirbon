<!DOCTYPE html>
<html>
<head>
  <title>Kasir Beras Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      padding: 20px;
    }
    .box {
      background: white;
      padding: 20px;
      border-radius: 12px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h2 {
      text-align: center;
    }
    input, select, button {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
    }
    button {
      background: #28a745;
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      background: #218838;
    }
    .result {
      margin-top: 10px;
      padding: 10px;
      background: #eee;
      border-radius: 8px;
      text-align: center;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Kasir Beras</h2>

  <label>Nama Pembeli</label>
  <input type="text" id="nama" placeholder="Masukkan nama">

  <label>Jenis Beras</label>
  <select id="jenis">
    <option value="5">5 Kg</option>
    <option value="10">10 Kg</option>
    <option value="15">15 Kg</option>
    <option value="30">30 Kg</option>
  </select>

  <label>Jumlah Karung</label>
  <input type="number" id="karung" value="1">

  <label>Harga Beli / Karung</label>
  <input type="number" id="beli" placeholder="Contoh: 50000">

  <label>Harga Jual / Karung</label>
  <input type="number" id="jual" placeholder="Contoh: 60000">

  <label>Status</label>
  <select id="status">
    <option>Cash</option>
    <option>Bon</option>
  </select>

  <div class="result" id="hasil">
    Total: Rp 0 | Untung: Rp 0
  </div>

  <button onclick="hitung()">Hitung</button>
  <button onclick="kirim()">Simpan ke Spreadsheet</button>
</div>

<script>

function hitung() {
  let kg = parseInt(document.getElementById("jenis").value);
  let karung = parseInt(document.getElementById("karung").value);
  let beli = parseInt(document.getElementById("beli").value);
  let jual = parseInt(document.getElementById("jual").value);

  if (!karung || !jual || !beli) {
    alert("Isi semua data dulu!");
    return;
  }

  let totalKg = kg * karung;
  let totalJual = jual * karung;
  let untung = (jual - beli) * karung;

  document.getElementById("hasil").innerText =
    "Total: Rp " + totalJual +
    " | Untung: Rp " + untung +
    " (" + totalKg + " Kg)";
}


function kirim() {
  let data = {
    nama: document.getElementById("nama").value,
    jenis: document.getElementById("jenis").value,
    karung: document.getElementById("karung").value,
    beli: document.getElementById("beli").value,
    jual: document.getElementById("jual").value,
    status: document.getElementById("status").value
  };

  if (!data.nama || !data.beli || !data.jual) {
    alert("Data belum lengkap!");
    return;
  }

  fetch("https://script.google.com/macros/s/AKfycbyc8k47luq0tY-gHq3PXwVLByDQ6MvtfNa1itMcC45UxCAtq4dmrLZ2hlWMeti5B-hf/exec", {
    method: "POST",
    mode: "no-cors", // WAJIB agar tidak error di Vercel
    body: JSON.stringify(data)
  });

  alert("✅ Data berhasil dikirim!");

  // reset form
  document.getElementById("nama").value = "";
  document.getElementById("karung").value = 1;
  document.getElementById("beli").value = "";
  document.getElementById("jual").value = "";
  document.getElementById("hasil").innerText = "Total: Rp 0 | Untung: Rp 0";
}

</script>

</body>
</html>
