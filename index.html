<!DOCTYPE html>
<html>
<head>
  <title>Kasir Beras</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      padding: 20px;
    }
    .box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 500px;
      margin: auto;
    }
    input, select, button {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
    }
    button {
      background: #28a745;
      color: white;
      border: none;
      cursor: pointer;
    }
    h3 {
      text-align: center;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Kasir Beras</h2>

  <label>Nama Pembeli</label>
  <input type="text" id="nama" placeholder="Masukkan nama">

  <label>Jenis Beras</label>
  <select id="jenis">
    <option value="5">5 Kg</option>
    <option value="10">10 Kg</option>
    <option value="15">15 Kg</option>
    <option value="30">30 Kg</option>
  </select>

  <label>Jumlah Karung</label>
  <input type="number" id="karung" value="1">

  <label>Harga per Karung</label>
  <input type="number" id="harga" placeholder="Masukkan harga">

  <label>Status</label>
  <select id="status">
    <option>Cash</option>
    <option>Bon</option>
  </select>

  <h3 id="total">Total: Rp 0</h3>

  <button onclick="hitung()">Hitung</button>
  <button onclick="kirim()">Simpan ke Spreadsheet</button>
</div>

<script>
function hitung() {
  let kg = parseInt(document.getElementById("jenis").value);
  let karung = parseInt(document.getElementById("karung").value);
  let harga = parseInt(document.getElementById("harga").value);

  if (!harga || !karung) {
    alert("Isi harga dan jumlah karung dulu!");
    return;
  }

  let totalKg = kg * karung;
  let totalHarga = harga * karung;

  document.getElementById("total").innerText =
    "Total: Rp " + totalHarga + " (" + totalKg + " Kg)";
}

function kirim() {
  let data = {
    nama: document.getElementById("nama").value,
    jenis: document.getElementById("jenis").value,
    karung: document.getElementById("karung").value,
    harga: document.getElementById("harga").value,
    status: document.getElementById("status").value
  };

  // Validasi sederhana
  if (!data.nama || !data.harga) {
    alert("Nama dan harga wajib diisi!");
    return;
  }

  fetch("https://script.google.com/macros/s/AKfycbxQjR4vvLDC0zHd2KhW_xmEgvcjzV0HRLxEK8q9KRSC1yKXqg7DHoMb-7wbN8SFcnd2/exec", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(res => {
    console.log(res);
    alert("✅ Data berhasil masuk ke Spreadsheet!");

    // reset form
    document.getElementById("nama").value = "";
    document.getElementById("karung").value = 1;
    document.getElementById("harga").value = "";
    document.getElementById("total").innerText = "Total: Rp 0";
  })
  .catch(err => {
    console.error(err);
    alert("❌ Gagal kirim data!");
  });
}
</script>

</body>
</html>
