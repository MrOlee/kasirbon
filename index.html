<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasir Beras</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #b04a56; 
            color: white; 
            padding: 20px; 
            display: flex;
            justify-content: center;
        }
        .box { 
            background: #a94450; 
            padding: 25px; 
            border-radius: 12px; 
            width: 100%;
            max-width: 450px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); 
        }
        h2 { text-align: center; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }
        label { display: block; margin-top: 10px; font-size: 0.9em; opacity: 0.9; }
        input, select, button { 
            width: 100%; 
            padding: 12px; 
            margin: 8px 0; 
            border-radius: 6px; 
            border: none; 
            box-sizing: border-box; 
            font-size: 16px;
        }
        input, select { background: #fdfdfd; color: #333; }
        button { 
            background: #222; 
            color: white; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
            margin-top: 15px;
        }
        button:hover { background: #000; transform: translateY(-1px); }
        button:disabled { background: #888; cursor: not-allowed; }
        #hasil { 
            background: rgba(0,0,0,0.15); 
            padding: 15px; 
            border-radius: 8px; 
            text-align: center; 
            margin-top: 15px;
            border: 1px dashed rgba(255,255,255,0.3);
        }
        .total-text { font-size: 1.4em; font-weight: bold; margin: 0; color: #fff; }
        .sub-text { font-size: 0.9em; margin: 5px 0 0 0; opacity: 0.8; }
    </style>
</head>
<body>

<div class="box">
    <h2>Kasir Beras</h2>
    <form id="kasirForm">
        <label>Nama Client:</label>
        <input name="nama" id="nama" placeholder="Nama Pembeli" required>

        <label>Ukuran Karung:</label>
        <select name="jenis" id="jenis">
            <option value="5">5 Kg</option>
            <option value="10">10 Kg</option>
            <option value="15">15 Kg</option>
            <option value="30">30 Kg</option>
        </select>

        <label>Jumlah Karung:</label>
        <input name="karung" id="karung" type="number" value="1" min="1" required>

        <label>Harga Beli (per karung):</label>
        <input name="beli" id="hargaBeli" type="number" placeholder="Contoh: 57000" required>

        <label>Harga Jual (per karung):</label>
        <input name="jual" id="hargaJual" type="number" placeholder="Contoh: 62000" required>

        <label>Status:</label>
        <select name="status" id="status">
            <option value="CASH">CASH</option>
            <option value="BON">BON</option>
        </select>

        <div id="hasil">
            <p class="total-text" id="dispTotal">Total: Rp 0</p>
            <p class="sub-text" id="dispDetail">Untung: Rp 0 (0 Kg)</p>
        </div>

        <button type="button" onclick="hitung()">CEK HITUNGAN</button>
        <button type="submit" id="btnSimpan">SIMPAN KE SPREADSHEET</button>
    </form>
</div>

<script>
    // 1. WAJIB GANTI DENGAN URL WEB APP HASIL DEPLOY TERBARU
    const URL_APP_SCRIPT = "https://script.google.com/macros/s/AKfycbz5Z7y0s_KINBJm5PSCa_-oioX35ntNd3wcaroZuhLHFf4N6Z_J0GM3q8xfw-Hi7q71/exec";

    function hitung() {
        const jenis = parseInt(document.getElementById("jenis").value) || 0;
        const karung = parseInt(document.getElementById("karung").value) || 0;
        const beli = parseInt(document.getElementById("hargaBeli").value) || 0;
        const jual = parseInt(document.getElementById("hargaJual").value) || 0;

        const totalKg = jenis * karung;
        const totalJual = jual * karung;
        const untung = (jual - beli) * karung;

        document.getElementById("dispTotal").innerText = "Total: Rp " + totalJual.toLocaleString('id-ID');
        document.getElementById("dispDetail").innerText = "Untung: Rp " + untung.toLocaleString('id-ID') + " (" + totalKg + " Kg)";
    }

    document.getElementById("kasirForm").addEventListener("submit", function(e) {
        e.preventDefault();
        
        const btn = document.getElementById("btnSimpan");
        const originalText = btn.innerText;
        
        btn.disabled = true;
        btn.innerText = "SEDANG MENYIMPAN...";

        // Mengirim data menggunakan URLSearchParams agar sinkron dengan e.parameter di Apps Script
        const data = new URLSearchParams(new FormData(this));

        fetch(URL_APP_SCRIPT, {
            method: "POST",
            body: data,
            mode: "no-cors"
        })
        .then(() => {
            alert("✅ DATA BERHASIL MASUK!");
            this.reset();
            document.getElementById("dispTotal").innerText = "Total: Rp 0";
            document.getElementById("dispDetail").innerText = "Untung: Rp 0 (0 Kg)";
        })
        .catch(err => {
            alert("❌ GAGAL: " + err);
        })
        .finally(() => {
            btn.disabled = false;
            btn.innerText = originalText;
        });
    });
</script>

</body>
</html>
