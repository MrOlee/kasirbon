<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Kasir Beras </title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Arial, sans-serif; background: #b04a56; color: white; padding: 20px; }
        .box { background: #a94450; padding: 20px; border-radius: 10px; max-width: 500px; margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        h2 { text-align: center; margin-bottom: 20px; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 5px; border: none; box-sizing: border-box; }
        input, select { background: #eee; color: #333; }
        button { background: #222; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #444; }
        button:disabled { background: #888; cursor: not-allowed; }
        #hasil { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 5px; text-align: center; }
    </style>
</head>
<body>

<div class="box">
    <h2>Kasir Beras</h2>
    <form id="kasirForm">
        <label>Nama Client:</label>
        <input name="nama" id="nama" placeholder="Masukkan Nama" required>

        <label>Jenis Ukuran:</label>
        <select name="jenis" id="jenis">
            <option value="5">5 Kg</option>
            <option value="10">10 Kg</option>
            <option value="15">15 Kg</option>
            <option value="30">30 Kg</option>
        </select>

        <label>Jumlah Karung:</label>
        <input name="karung" id="karung" type="number" value="1" min="1" required>

        <label>Harga Beli (per karung):</label>
        <input name="beli" id="hargaBeli" type="number" placeholder="Contoh: 57000" required>

        <label>Harga Jual (per karung):</label>
        <input name="jual" id="hargaJual" type="number" placeholder="Contoh: 62000" required>

        <label>Status Pembayaran:</label>
        <select name="status" id="status">
            <option value="CASH">CASH</option>
            <option value="BON">BON</option>
        </select>

        <div id="hasil">
            <h3>Total: Rp 0</h3>
            <p>Untung: Rp 0 (0 Kg)</p>
        </div>

        <button type="button" onclick="hitung()">Cek Hitungan</button>
        <button type="submit" id="btnSimpan">Simpan ke Spreadsheet</button>
    </form>
</div>

<script>
const URL_APP_SCRIPT = "https://script.google.com/macros/s/AKfycbxb_dQqdPnaXrWbjtAMykTgONhpEl2HgxvkH0JH8E-txCbtwyT5avRTg2nx01gVAtQ1/exec";

document.getElementById("kasirForm").addEventListener("submit", function(e) {
    e.preventDefault();
    
    const btn = document.getElementById("btnSimpan");
    btn.disabled = true;
    btn.innerText = "Proses...";

    // Menggunakan fetch dengan mode no-cors
    fetch(URL_APP_SCRIPT, {
        method: "POST",
        body: new URLSearchParams(new FormData(this)),
        mode: "no-cors"
    })
    .then(() => {
        alert("Selesai! Silahkan cek Spreadsheet.");
        this.reset();
        document.getElementById("hasil").innerHTML = "<h3>Total: Rp 0</h3>";
    })
    .catch(error => {
        alert("Error: " + error);
    })
    .finally(() => {
        btn.disabled = false;
        btn.innerText = "Simpan ke Spreadsheet";
    });
});
</script>

</body>
</html>
