<!DOCTYPE html>
<html>
<head>
<title>Kasir Beras Final</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:Arial;background:#b04a56;color:white;padding:20px;}
.box{background:#a94450;padding:20px;border-radius:10px;max-width:500px;margin:auto;}
input,select,button{width:100%;padding:10px;margin:5px 0;}
button{background:#222;color:white;cursor:pointer;}
</style>
</head>

<body>

<div class="box">
<h2>Kasir Beras</h2>

<input id="nama" placeholder="Nama Pembeli">

<select id="jenis">
<option value="5">5 Kg</option>
<option value="10">10 Kg</option>
<option value="15">15 Kg</option>
<option value="30">30 Kg</option>
</select>

<input id="karung" type="number" value="1">

<input id="hargaBeli" type="number" placeholder="Harga Beli">
<input id="hargaJual" type="number" placeholder="Harga Jual">

<select id="status">
<option>CASH</option>
<option>BON</option>
</select>

<h3 id="hasil">Total: Rp 0</h3>

<button onclick="hitung()">Hitung</button>
<button onclick="kirim()">Simpan</button>

</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbyc8k47luq0tY-gHq3PXwVLByDQ6MvtfNa1itMcC45UxCAtq4dmrLZ2hlWMeti5B-hf/exec";

function hitung(){
let jenis = parseInt(document.getElementById("jenis").value);
let karung = parseInt(document.getElementById("karung").value);
let beli = parseInt(document.getElementById("hargaBeli").value);
let jual = parseInt(document.getElementById("hargaJual").value);

let totalKg = jenis * karung;
let totalJual = jual * karung;
let untung = (jual - beli) * karung;

document.getElementById("hasil").innerText =
"Total: Rp " + totalJual +
" | Untung: Rp " + untung +
" (" + totalKg + " Kg)";
}

function kirim(){

let data = {
  nama: document.getElementById("nama").value,
  jenis: document.getElementById("jenis").value,
  karung: document.getElementById("karung").value,
  hargaBeli: document.getElementById("hargaBeli").value,
  hargaJual: document.getElementById("hargaJual").value,
  status: document.getElementById("status").value
};

fetch(URL,{
  method:"POST",
  mode:"no-cors",
  body:JSON.stringify(data)
});

alert("✅ Data masuk ke Spreadsheet!");
}

</script>

</body>
</html>
