<!DOCTYPE html>
<html>
<head>
  <title>Kasir Beras Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { margin:0; font-family: Arial; background:#b04a56; color:#fff; }
    .container { display:flex; height:100vh; }

    /* SIDEBAR */
    .sidebar {
      width:250px; padding:15px; background:#a2444f;
      border-right:3px solid #fff;
    }
    .menu-btn {
      display:block; margin:10px 0; padding:10px;
      background:#c25a66; border:2px solid #fff; cursor:pointer;
      text-align:center; font-weight:bold;
    }

    /* MAIN */
    .main { flex:1; padding:15px; }

    .top {
      display:flex; gap:10px; margin-bottom:10px;
    }

    input, select {
      padding:8px; width:100%;
    }

    table {
      width:100%; border-collapse:collapse; background:#fff; color:#000;
    }
    th, td { border:1px solid #000; padding:5px; }

    .btn {
      background:#333; color:#fff; padding:10px; cursor:pointer;
    }

    .dashboard {
      display:flex; gap:10px; margin-top:10px;
    }

    .card {
      background:#2e6fa3; padding:10px; border-radius:8px;
      width:150px; text-align:center;
    }

    /* MODAL */
    .modal {
      display:none; position:fixed; top:50%; left:50%;
      transform:translate(-50%,-50%);
      background:#b04a56; padding:20px; border:2px solid #fff;
      width:600px;
    }

    .close { float:right; cursor:pointer; }

  </style>
</head>
<body>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="menu-btn" onclick="openModal('stok')">INPUT STOK</div>
    <div class="menu-btn" onclick="openModal('member')">DATA MEMBER</div>
    <div class="menu-btn" onclick="openModal('bon')">DATA BON</div>
    <div class="menu-btn" onclick="openModal('rekap')">REKAP HARIAN</div>
    <div class="menu-btn" onclick="openModal('transaksi')">TRANSAKSI HARIAN</div>

    <div class="dashboard">
      <div class="card">Cash<br>Rp <span id="cash">0</span></div>
      <div class="card">Bon<br>Rp <span id="bonTotal">0</span></div>
      <div class="card">Lunas<br>Rp <span id="lunas">0</span></div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="top">
      <input id="nama" placeholder="Nama Pembeli">
      <select id="jenis">
        <option value="5">5 Kg</option>
        <option value="10">10 Kg</option>
        <option value="15">15 Kg</option>
        <option value="30">30 Kg</option>
      </select>
      <input id="karung" type="number" value="1">
      <input id="beli" type="number" placeholder="Harga Beli">
      <input id="jual" type="number" placeholder="Harga Jual">
      <select id="status">
        <option>Cash</option>
        <option>Bon</option>
      </select>
      <button class="btn" onclick="tambah()">Tambah</button>
    </div>

    <table id="tabel">
      <thead>
        <tr>
          <th>Nama</th>
          <th>Jenis</th>
          <th>Karung</th>
          <th>Total</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <h3>Total Belanja: Rp <span id="total">0</span></h3>
    <button class="btn" onclick="kirim()">PROSES TRANSAKSI</button>

    <canvas id="chart"></canvas>

  </div>
</div>

<!-- MODALS -->
<div id="stok" class="modal">
  <span class="close" onclick="closeModal('stok')">X</span>
  <h3>INPUT STOK</h3>
  <input placeholder="Nama Barang">
  <input placeholder="Harga Beli">
  <input placeholder="Harga Jual">
</div>

<div id="bon" class="modal">
  <span class="close" onclick="closeModal('bon')">X</span>
  <h3>DATA BON</h3>
  <table>
    <tr><th>Nama</th><th>Total Bon</th></tr>
  </table>
</div>

<div id="rekap" class="modal">
  <span class="close" onclick="closeModal('rekap')">X</span>
  <h3>REKAP HARIAN</h3>
</div>

<script>

let total = 0;
let cash = 0;
let bon = 0;

function tambah() {
  let nama = document.getElementById("nama").value;
  let kg = document.getElementById("jenis").value;
  let karung = document.getElementById("karung").value;
  let jual = document.getElementById("jual").value;
  let status = document.getElementById("status").value;

  let totalHarga = karung * jual;

  let row = `<tr>
    <td>${nama}</td>
    <td>${kg} Kg</td>
    <td>${karung}</td>
    <td>${totalHarga}</td>
    <td>${status}</td>
  </tr>`;

  document.querySelector("#tabel tbody").innerHTML += row;

  total += totalHarga;

  if(status == "Cash") cash += totalHarga;
  else bon += totalHarga;

  updateUI();
}

function updateUI() {
  document.getElementById("total").innerText = total;
  document.getElementById("cash").innerText = cash;
  document.getElementById("bonTotal").innerText = bon;
}

function kirim() {
  fetch("URL_WEB_APP_KAMU", {
    method: "POST",
    mode: "no-cors",
    body: JSON.stringify({total, cash, bon})
  });

  alert("Transaksi disimpan!");
}

function openModal(id) {
  document.getElementById(id).style.display = "block";
}
function closeModal(id) {
  document.getElementById(id).style.display = "none";
}

/* CHART */
new Chart(document.getElementById("chart"), {
  type: 'bar',
  data: {
    labels: ["Cash", "Bon"],
    datasets: [{
      data: [cash, bon]
    }]
  }
});

</script>

</body>
</html>
